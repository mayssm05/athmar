openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Athmar (أثمر) API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: advisor
    description: AI savings advisor (المزارع الذكي)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /advisor/chat:
    post:
      operationId: advisorChat
      tags: [advisor]
      summary: Send a message to the AI savings advisor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvisorChatInput"
      responses:
        "200":
          description: Advisor reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvisorChatResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /advisor/plant:
    post:
      operationId: advisorPlant
      tags: [advisor]
      summary: Get a motivational reason for a savings goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvisorPlantInput"
      responses:
        "200":
          description: Motivational reason
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvisorPlantResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    AdvisorChatInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
        history:
          type: array
          items:
            type: object
            required: [role, content]
            properties:
              role:
                type: string
                enum: [user, assistant]
              content:
                type: string

    AdvisorChatResponse:
      type: object
      required: [reply]
      properties:
        reply:
          type: string

    AdvisorPlantInput:
      type: object
      required: [goal, amount, months]
      properties:
        goal:
          type: string
          minLength: 1
        amount:
          type: number
          minimum: 1
        months:
          type: integer
          minimum: 1

    AdvisorPlantResponse:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
